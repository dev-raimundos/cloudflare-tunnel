services:
  cloudflared:
    image: "cloudflare/cloudflared:2026.6.1"
    container_name: cloudflared
    restart: unless-stopped
    command: "tunnel run"
    environment:
      TUNNEL_TOKEN: "${TUNNEL_TOKEN}"
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - home-network

networks:
  home-network:
    external: true
