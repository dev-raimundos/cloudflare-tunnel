services:
  cloudflared:
    image: cloudflare/cloudflared:2026.6.1
    container_name: cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
      - TUNNEL_TRANSPORT_PROTOCOL=http2
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      home-network:
    restart: unless-stopped

networks:
  home-network:
    name: home-network
    external: true
